name: QA
on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "hotfix/*"
      - "release/*"
      - "renovate/*"
  pull_request:

jobs:
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
  test:
    uses: canonical/starflow/.github/workflows/test-python.yaml@work/secrets
    with:
      fast-test-platforms: '["ubuntu-22.04", "ubuntu-24.04", "ubuntu-24.04-arm", "windows-latest", "macos-latest"]'
      slow-test-platforms: '["ubuntu-22.04", "ubuntu-24.04-arm"]'
      extra-env-vars: |
        STAGING_SSO_USERNAME=$SECRET_1
        STAGING_SSO_PASSWORD=$SECRET_2
    secrets:
      secret-1: ${{ vars.STAGING_SSO_USERNAME }}
      secret-2: ${{ secrets.STAGING_SSO_PASSWORD }}
