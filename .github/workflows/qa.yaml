name: QA
on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "hotfix/*"
      - "release/*"
      - "renovate/*"
  pull_request:

jobs:
  filter:
    runs-on: ubuntu-slim
    outputs:
      source-files: ${{ steps.filter.outputs.source-files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Combine multiple negation checks into a union (¬A ∧ ¬B ∧ ¬C), because individual entries are checked independently (A ∨ B ∨ C).
          # If we ever need to filter only for docs, glob 'docs/**/*' and '**/*.md'
          filters: |
            source-files:
              - '!({docs/**,*.md,**/*.md,.readthedocs.yaml})'
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
  test:
    needs: filter
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    with:
      fast-test-platforms: '["ubuntu-22.04", "ubuntu-24.04", "ubuntu-24.04-arm", "ubuntu-26.04", "ubuntu-26.04-arm", "windows-latest", "macos-latest"]'
      fast-test-python-versions: '["3.10", "3.11", "3.12", "3.14"]'
      slow-test-platforms: '["ubuntu-22.04", "ubuntu-24.04-arm", "ubuntu-26.04", "ubuntu-26.04-arm"]'
      slow-test-python-versions: '["3.10", "3.11", "3.12", "3.14"]'
      extra-env-vars: |
        STAGING_SSO_USERNAME=${{ vars.STAGING_SSO_USERNAME }}
        STAGING_SSO_PASSWORD=$SECRET_1
      source-files: ${{ needs.filter.outputs.source-files }}
    secrets:
      secret-1: ${{ secrets.STAGING_SSO_PASSWORD }}
